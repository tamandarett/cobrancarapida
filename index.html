<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <title>Cobrança Rápida | Tamandaré Tintas</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --gray-light: #f8f9fa; --gray-medium: #e9ecef; --gray-chumbo: #495057; --text-dark: #343a40;
            --wa-green: #25d366; --wa-cobrado: #8eb19f; --primary-blue: #0d6efd; --tamandare-red: #fa5252;
            --atraso-4: #ffd43b; --atraso-11: #fd7e14; --atraso-30: #fa5252;
        }

        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f1f3f5; color: var(--text-dark); margin: 0; padding: 20px; }
        .container { max-width: 1250px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h1 { margin: 0; font-weight: 300; color: #495057; font-size: 28px; }
        .logo { height: 50px; }

        .input-row { display: flex; align-items: center; gap: 20px; margin-bottom: 15px; padding: 15px; background: var(--gray-light); border-radius: 8px; border-left: 5px solid var(--tamandare-red); }
        .btn-upload-wrapper { position: relative; overflow: hidden; display: inline-block; }
        .btn-upload { background: var(--tamandare-red); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 10px; transition: 0.2s; }
        .btn-upload:hover { background: #e03131; }
        .btn-upload input[type=file] { position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }

        .stats-container { display: flex; gap: 15px; flex-grow: 1; margin-left: 10px; }
        .stat-item { font-size: 10px; text-transform: uppercase; color: #adb5bd; border-right: 1px solid #dee2e6; padding-right: 15px; }
        .stat-item:last-child { border-right: none; }
        .stat-value { display: block; color: var(--gray-chumbo); font-weight: bold; font-size: 14px; }

        .input-group { display: flex; align-items: center; gap: 10px; font-size: 14px; color: var(--gray-chumbo); }
        .input-cobrador { padding: 10px; border: 1px solid #ddd; border-radius: 6px; width: 150px; outline: none; }
        .radio-group { display: flex; gap: 10px; font-size: 12px; background: white; padding: 5px 10px; border-radius: 6px; border: 1px solid #ddd; }

        .controls { display: flex; gap: 10px; margin-bottom: 25px; align-items: center; flex-wrap: wrap; }
        .search-box { flex-grow: 1; padding: 11px; border: 1px solid var(--gray-medium); border-radius: 8px; outline: none; }
        .btn-filter { background: white; border: 1px solid #dee2e6; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 500; color: #6c757d; }
        .btn-filter.active { background: var(--gray-chumbo); color: white; border-color: var(--gray-chumbo); }
        .btn-custom { background: white; color: var(--gray-chumbo); border: 1px solid #dee2e6; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; }

        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { padding: 12px; text-align: left; font-size: 11px; text-transform: uppercase; color: #adb5bd; border-bottom: 2px solid var(--gray-light); }
        td { padding: 16px 12px; border-bottom: 1px solid var(--gray-light); font-size: 14px; vertical-align: top; }
        
        .cliente-nome.cobrado { text-decoration: line-through; opacity: 0.5; color: #999; }
        
        /* Botão corrigido para usar a tag <button> mantendo o design da tag <a> */
        .btn-wa { background: var(--wa-green); color: white; border: none; padding: 8px 14px; border-radius: 6px; cursor: pointer; font-family: inherit; font-weight: 600; font-size: 12px; display: inline-block; min-width: 90px; text-align: center; }
        .btn-wa.cobrado-status { background: var(--wa-cobrado); color: #555; font-weight: 500; }
        
        .titulos-list { font-size: 11px; margin-top: 4px; color: #666; font-family: monospace; }
        .badge-dias { font-weight: bold; }
        .chk-cobrado { width: 20px; height: 20px; cursor: pointer; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
        .modal-content { background: white; padding: 30px; border-radius: 15px; max-width: 500px; width: 90%; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .btn-modal-close { background: var(--gray-chumbo); color: white; border: none; padding: 12px 30px; border-radius: 8px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>

<div id="customAlert" class="modal-overlay">
    <div class="modal-content">
        <h3 style="color: var(--tamandare-red);">⚠️ Aviso</h3>
        <p id="alertMsg" style="text-align: left; background: #fff5f5; padding: 15px; border-radius: 8px; border: 1px solid #fed7d7; font-size: 14px;"></p>
        <button class="btn-modal-close" onclick="fecharErro()">Entendi</button>
    </div>
</div>

<div class="container">
    <div class="header">
        <h1>Cobrança Rápida</h1>
        <img src="logo.png" alt="Logo" class="logo">
    </div>

    <div class="input-row">
        <div class="btn-upload-wrapper">
            <button class="btn-upload">
                <span>📁</span> <span id="fileNameLabel">Carregar CSV</span>
                <input type="file" id="csvFile" accept=".csv">
            </button>
        </div>
        <div class="stats-container">
            <div class="stat-item">Clientes <span class="stat-value" id="statTotal">0</span></div>
            <div class="stat-item">CA <span class="stat-value" id="statCA">0</span></div>
            <div class="stat-item">FT e Afins <span class="stat-value" id="statFT">0</span></div>
            <div class="stat-item">Sem Whats <span class="stat-value" id="statSemFone" style="color: var(--tamandare-red);">0</span></div>
        </div>
        <div class="input-group">
            <label><strong>Enviar por:</strong></label>
            <div class="radio-group">
                <label><input type="radio" name="waPref" value="web" checked onchange="salvarPref(this.value)"> Web</label>
                <label><input type="radio" name="waPref" value="app" onchange="salvarPref(this.value)"> App</label>
            </div>
        </div>
        <div class="input-group">
            <label><strong>Cobrador:</strong></label>
            <input type="text" id="cobradorNome" class="input-cobrador" placeholder="Nome">
        </div>
    </div>

    <div class="controls">
        <button class="btn-filter active" id="btnFT" onclick="setFilter('FT')">FT e Afins</button>
        <button class="btn-filter" id="btnCA" onclick="setFilter('CA')">Carteira (CA)</button>
        <input type="text" id="search" class="search-box" placeholder="Pesquisar por nome ou código...">
        <button class="btn-custom" onclick="exportarLog()">📄 Baixar Cobranças Realizadas</button>
        <button class="btn-custom" onclick="exportarSemFone()">⚠️ Clientes sem WhatsApp</button>
    </div>
    
    <table id="tabelaCobranca">
        <thead>
            <tr>
                <th style="width: 24%;">Código | Cliente</th>
                <th id="colDataRef" style="width: 33%;">Títulos / Vencimento / Atraso</th>
                <th style="width: 10%;">Total</th>
                <th style="width: 12%;">Últ. Cobrança</th>
                <th style="width: 16%; text-align: right;">Ação</th>
                <th style="width: 5%; text-align: center;">✔</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
    // Configurações de Memória
    const MS_IN_DAY = 24 * 60 * 60 * 1000;
    let billingHistory = JSON.parse(localStorage.getItem('tt_billing_history') || '{}');
    let fileSessions = JSON.parse(localStorage.getItem('tt_file_sessions') || '{}');

    // Limpa registros velhos (7 dias para títulos, 3 dias para arquivos)
    function limparHistoricoAntigo() {
        const now = Date.now();
        Object.keys(billingHistory).forEach(doc => {
            if (now - billingHistory[doc] > 7 * MS_IN_DAY) delete billingHistory[doc];
        });
        localStorage.setItem('tt_billing_history', JSON.stringify(billingHistory));

        Object.keys(fileSessions).forEach(key => {
            if (now - fileSessions[key].ts > 3 * MS_IN_DAY) delete fileSessions[key];
        });
        localStorage.setItem('tt_file_sessions', JSON.stringify(fileSessions));
    }
    limparHistoricoAntigo();

    let rawData = [];
    let currentMode = 'FT';
    let cobradosIds = new Set();
    let currentFileKey = "";
    let agrupadosTelaGlobal = {}; // Usado para acessar os dados na hora do clique no botão

    const mostrarErro = (t) => { document.getElementById('alertMsg').innerText = t; document.getElementById('customAlert').style.display = 'flex'; };
    const fecharErro = () => { document.getElementById('customAlert').style.display = 'none'; };
    
    const converterValor = (v) => { 
        if (!v) return 0; 
        let s = v.toString().trim(); 
        if (s.includes(',') && s.includes('.')) s = s.replace(/\./g, '').replace(',', '.'); 
        else if (s.includes(',')) s = s.replace(',', '.'); 
        let n = parseFloat(s); return isNaN(n) ? 0 : n; 
    };
    
    const formatarMoeda = (v) => Number(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    const formatarDataHora = (ts) => {
        const d = new Date(ts);
        return d.toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit'}) + ' ' + d.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
    };

    const salvarPref = (v) => localStorage.setItem('tt_wa_pref', v);
    
    window.onload = () => { 
        const p = localStorage.getItem('tt_wa_pref'); 
        if (p) document.querySelector(`input[name="waPref"][value="${p}"]`).checked = true; 
    };

    function saveFileSession() {
        if (!currentFileKey) return;
        fileSessions[currentFileKey] = { ts: Date.now(), ids: Array.from(cobradosIds) };
        localStorage.setItem('tt_file_sessions', JSON.stringify(fileSessions));
    }

    document.getElementById('csvFile').addEventListener('change', function(e) {
        if (e.target.files.length > 0) {
            const file = e.target.files[0]; 
            document.getElementById('fileNameLabel').innerText = file.name;
            currentFileKey = file.name + "_" + file.size;

            Papa.parse(file, { 
                header: true, delimiter: ";", encoding: "ISO-8859-1", skipEmptyLines: true, 
                complete: (res) => {
                    const cols = ["FONE", "DIAS EMATRASO", "CPF/CNPJ", "VALORATUALIZADO", "VALOR ARECEBER"];
                    if (!cols.every(c => (res.meta.fields || []).includes(c))) { 
                        mostrarErro("Relatório incompatível. Use o caminho: CONTAS A RECEBER -> RELATÓRIOS -> CLIENTES -> TÍTULOS EM ABERTO ANALÍTICO."); 
                        rawData = []; e.target.value = ""; atualizarContadores({}); 
                    } else { 
                        // Restaura a sessão do arquivo ou zera
                        if (fileSessions[currentFileKey]) {
                            cobradosIds = new Set(fileSessions[currentFileKey].ids);
                        } else {
                            cobradosIds.clear(); 
                        }
                        rawData = res.data; 
                        processAndRender(); 
                    }
                }
            });
        }
    });

    const normalizarFP = (i) => { const d = (i["DOCUMENTO"] || "").toUpperCase(); return d.includes("D") ? "FT" : i["FP"]; };
    
    const setFilter = (m) => { 
        currentMode = m; 
        document.getElementById('btnFT').classList.toggle('active', m==='FT'); 
        document.getElementById('btnCA').classList.toggle('active', m==='CA'); 
        document.getElementById('colDataRef').innerText = m==='CA' ? 'Títulos / Emissão' : 'Títulos / Vencimento / Atraso'; 
        processAndRender(); 
    };

    function toggleCheck(id) { 
        if (cobradosIds.has(id)) cobradosIds.delete(id);
        else cobradosIds.add(id);
        saveFileSession();
        processAndRender(); 
    }

    // NOVA FUNÇÃO: Acionada ao clicar no botão do WhatsApp
    function acionarWhatsApp(id, url, target) {
        // Abre o Link
        window.open(url, target);

        // Atualiza Histórico de Títulos
        const now = Date.now();
        const grupo = agrupadosTelaGlobal[id];
        if (grupo) {
            grupo.titulos.forEach(t => {
                billingHistory[t.num] = now;
            });
            localStorage.setItem('tt_billing_history', JSON.stringify(billingHistory));
        }

        // Marca a linha como cobrada
        if (!cobradosIds.has(id)) {
            cobradosIds.add(id);
            saveFileSession();
        }

        processAndRender();
    }

    function atualizarContadores(ag) {
        let t=Object.keys(ag).length, ca=0, ft=0, sf=0;
        Object.values(ag).forEach(g => {
            const fd = processarTelefone(g.fone); if (!fd.valido) sf++;
            const tFT = g.titulos.some(t => t.num.toUpperCase().includes("D") || ['FT','DP','IX','CP','RN'].includes(t.fpO));
            const tCA = g.titulos.some(t => t.fpO === 'CA' && !t.num.toUpperCase().includes("D"));
            if (tFT) ft++; if (tCA) ca++;
        });
        document.getElementById('statTotal').innerText=t; 
        document.getElementById('statCA').innerText=ca; 
        document.getElementById('statFT').innerText=ft; 
        document.getElementById('statSemFone').innerText=sf;
    }

    function processarTelefone(t) {
        if (!t) return { valido: false, numeroLimpo: "", original: "Sem fone" };
        let c = t.replace(/\D/g, ''); if (c.startsWith('0')) c = c.substring(1);
        return { valido: (c.length === 11 && c.charAt(2) === '9'), numeroLimpo: "55" + c, original: t.trim() };
    }

    function processAndRender() {
        const term = document.getElementById('search').value.toLowerCase();
        const cobr = document.getElementById('cobradorNome').value.trim();
        const todos = {};
        
        rawData.forEach(i => { 
            const id = i["CPF/CNPJ"]; if (!id) return; 
            if (!todos[id]) todos[id] = { fone: i["FONE"], titulos: [] }; 
            todos[id].titulos.push({ num: i["DOCUMENTO"], fpO: i["FP"] }); 
        });
        atualizarContadores(todos);

        let fil = rawData.filter(i => { 
            const d = parseInt(i["DIAS EMATRASO"]) || 0;
            const fp = normalizarFP(i); 
            return currentMode === 'CA' ? fp === 'CA' : (['FT','DP','IX','CP','RN'].includes(fp) && d >= 4); 
        });
        
        if (term) fil = fil.filter(i => i["NOME DO CLIENTE"]?.toLowerCase().includes(term) || i["CÓDIGO"]?.toString().includes(term));
        
        const agT = {};
        fil.forEach(i => {
            const id = i["CPF/CNPJ"]; if (!id) return;
            if (!agT[id]) agT[id] = { codigo: i["CÓDIGO"], nome: (i["NOME DO CLIENTE"] || "").trim(), fone: i["FONE"], id: id, tO: 0, tA: 0, titulos: [] };
            const vO = converterValor(i["VALOR ARECEBER"]);
            const vA = converterValor(i["VALORATUALIZADO"]);
            agT[id].tO += vO; 
            agT[id].tA += vA; 
            agT[id].titulos.push({ num: i["DOCUMENTO"], emissao: i["DATAEMISSÃO"], venc: i["DATAVENCIMENTO"], dias: parseInt(i["DIAS EMATRASO"])||0, vOrig: vO, vAtu: vA });
        });

        // Atualiza a variável global para o botão WhatsApp acessar depois
        agrupadosTelaGlobal = agT;

        let arr = Object.values(agT); 
        arr.forEach(g => g.fd = processarTelefone(g.fone));
        arr.sort((a,b) => (a.fd.valido === b.fd.valido) ? a.nome.localeCompare(b.nome) : (a.fd.valido ? -1 : 1));
        
        const tbody = document.querySelector('#tabelaCobranca tbody'); 
        tbody.innerHTML = '';

        arr.forEach(g => {
            const esta = cobradosIds.has(g.id);
            const tot = currentMode === 'CA' ? formatarMoeda(g.tO) : formatarMoeda(g.tA);
            const mAt = Math.max(...g.titulos.map(t => t.dias));
            const pref = document.querySelector('input[name="waPref"]:checked').value;
            const saud = `Olá, *${g.nome || 'Cliente'}*! Tudo bem? ${cobr ? 'Aqui é *' + cobr + '* da Tamandaré Tintas.' : 'Aqui é da Tamandaré Tintas.'}`;
            const ass = cobr ? `Atenciosamente,\n*${cobr}*\nTamandaré Tintas` : `Atenciosamente,\nEquipe Tamandaré Tintas`;

            let maisRecente = 0;

            let tHtml = g.titulos.map(t => { 
                let cor = '#adb5bd'; 
                if (currentMode !== 'CA') { 
                    if(t.dias>=30) cor='var(--atraso-30)'; 
                    else if(t.dias>=11) cor='var(--atraso-11)'; 
                    else if(t.dias>=4) cor='var(--atraso-4)'; 
                } 
                
                // Lógica do Carimbo por Título
                let ts = billingHistory[t.num];
                if (ts && ts > maisRecente) maisRecente = ts;
                let carimbo = ts ? `<span style="color: var(--primary-blue); margin-left: 5px;">[Cobrado ${formatarDataHora(ts)}]</span>` : '';

                return `<div class="titulos-list">• Doc: ${t.num} | ${currentMode==='CA'?t.emissao:t.venc} | <span class="badge-dias" style="color:${cor}">${t.dias} Dias</span>${carimbo}</div>`; 
            }).join('');

            // Define o que aparece na nova coluna "Última Cobrança"
            let htmlColunaCobranca = `<span style="color: #adb5bd; font-size: 12px;">Nunca</span>`;
            if (maisRecente > 0) {
                htmlColunaCobranca = `<strong style="color: var(--primary-blue); font-size: 12px;">${formatarDataHora(maisRecente)}</strong>`;
            }

            let mBody = currentMode === 'CA' 
                ? g.titulos.map(t => `- Título: ${t.num} | Emissão: ${t.emissao} | Valor: ${formatarMoeda(t.vOrig)}`).join('\n') 
                : g.titulos.map(t => `- Doc: ${t.num} | Venc.: ${t.venc} | Original: ${formatarMoeda(t.vOrig)} | Atualizado: ${formatarMoeda(t.vAtu)}`).join('\n');
            
            let mEnd = currentMode === 'CA' 
                ? `*Total: ${formatarMoeda(g.tO)}*\n\nPor favor, informe a forma de pagamento desejada:\n\n● PIX - Enviaremos a chave para pagamento.\n● BOLETO - Informe o vencimento desejado.\n● CARTÃO - Pagamento na loja.\n\nNo aguardo. Obrigado.` 
                : `*Total Original: ${formatarMoeda(g.tO)}*\n*Total Atualizado: ${formatarMoeda(g.tA)}*\n\n${mAt >= 30 ? 'Solicitamos a regularização imediata para evitar protesto.' : mAt >= 11 ? 'Tem alguma posição sobre esses pagamentos?' : 'Caso o pagamento já tenha sido realizado, favor desconsiderar.'}\n\n${ass}`;
            
            const msg = `${saud}\n\n${currentMode==='CA'?'Estou passando o fechamento:':'Notamos títulos em aberto no sistema:'}\n\n${mBody}\n\n${mEnd}`;
            const link = pref === 'web' ? `https://wa.me/${g.fd.numeroLimpo}?text=${encodeURIComponent(msg)}` : `whatsapp://send?phone=${g.fd.numeroLimpo}&text=${encodeURIComponent(msg)}`;
            const linkTarget = pref === 'web' ? 'aba_whatsapp' : '_self';

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>
                    <span class="cliente-nome ${esta?'cobrado':''}">
                        <small style="color:#adb5bd">${g.codigo}</small><br><strong>${g.nome}</strong>
                    </span>
                </td>
                <td>${tHtml}</td>
                <td style="vertical-align:middle"><strong>${tot}</strong></td>
                <td style="vertical-align:middle">${htmlColunaCobranca}</td>
                <td style="text-align:right;vertical-align:middle">
                    ${g.fd.valido
                        ? `<div style="display:inline-flex;flex-direction:column;align-items:center">
                               <button class="btn-wa ${esta?'cobrado-status':''}" onclick="acionarWhatsApp('${g.id}', '${link}', '${linkTarget}')">${esta?'Cobrado':'WhatsApp'}</button>
                               <span style="font-size:10px;color:#666;font-family:monospace;margin-top:5px">${g.fd.original}</span>
                           </div>`
                        : `<span style="font-size:12px;color:#999">${g.fd.original}</span>`
                    }
                </td>
                <td style="text-align:center;vertical-align:middle">
                    <input type="checkbox" class="chk-cobrado" ${esta?'checked':''} onclick="toggleCheck('${g.id}')">
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    function exportarLog() { 
        let l = []; const s = new Set(); 
        rawData.forEach(i => { 
            if (cobradosIds.has(i["CPF/CNPJ"]) && !s.has(i["CPF/CNPJ"])) { 
                l.push(`Cliente: ${i["NOME DO CLIENTE"]} | Código: ${i["CÓDIGO"]} | CPF/CNPJ: ${i["CPF/CNPJ"]}`); 
                s.add(i["CPF/CNPJ"]); 
            } 
        }); 
        if (l.length === 0) return mostrarErro("Nenhum cliente marcado no checklist."); 
        const b = new Blob([l.join('\n')], { type: 'text/plain' }); 
        const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = `log-cobranca.txt`; a.click(); 
    }

    function exportarSemFone() { 
        const t = document.getElementById('search').value.toLowerCase(); 
        let f = rawData.filter(i => { 
            const fd = processarTelefone(i["FONE"]), b = !t || i["NOME DO CLIENTE"]?.toLowerCase().includes(t) || i["CÓDIGO"]?.toString().includes(t); 
            return currentMode==='CA' ? (normalizarFP(i)==='CA' && !fd.valido && b) : (['FT','DP','IX','CP','RN'].includes(normalizarFP(i)) && (parseInt(i["DIAS EMATRASO"])||0) >= 4 && !fd.valido && b); 
        }); 
        const l = []; const s = new Set(); 
        f.forEach(i => { 
            if (!s.has(i["CPF/CNPJ"])) { 
                l.push(`Código: ${i["CÓDIGO"]} | Cliente: ${i["NOME DO CLIENTE"].trim()} | Fone: ${i["FONE"]||"Vazio"}`); 
                s.add(i["CPF/CNPJ"]); 
            } 
        }); 
        if (l.length === 0) return mostrarErro("Nenhum cliente sem Whats encontrado."); 
        const b = new Blob([l.join('\n')], { type: 'text/plain' }); 
        const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = `clientes_sem_whatsapp.txt`; a.click(); 
    }

    document.getElementById('search').addEventListener('input', processAndRender);
    document.getElementById('cobradorNome').addEventListener('input', processAndRender);
</script>
</body>
</html>
