<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <title>Cobrança Rápida | Tamandaré Tintas</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --gray-light: #f8f9fa; --gray-medium: #e9ecef; --gray-chumbo: #495057; --text-dark: #343a40;
            --wa-green: #25d366; --wa-cobrado: #8eb19f; --tamandare-red: #fa5252;
            --atraso-4: #ffd43b; --atraso-11: #fd7e14; --atraso-30: #fa5252;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f1f3f5; color: var(--text-dark); margin: 0; padding: 20px; }
        .container { max-width: 1300px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h1 { margin: 0; font-weight: 300; color: #495057; font-size: 28px; }
        .logo { height: 50px; }
        
        .input-row { display: flex; align-items: center; gap: 20px; margin-bottom: 15px; padding: 15px; background: var(--gray-light); border-radius: 8px; border-left: 5px solid var(--tamandare-red); }
        .btn-upload { background: var(--tamandare-red); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 10px; position: relative; overflow: hidden; }
        .btn-upload input[type=file] { position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
        
        .stats-container { display: flex; gap: 15px; flex-grow: 1; }
        .stat-item { font-size: 10px; text-transform: uppercase; color: #adb5bd; border-right: 1px solid #dee2e6; padding-right: 15px; }
        .stat-item:last-child { border-right: none; }
        .stat-value { display: block; color: var(--gray-chumbo); font-weight: bold; font-size: 14px; }
        
        .radio-group { display: flex; gap: 10px; font-size: 12px; background: white; padding: 5px 10px; border-radius: 6px; border: 1px solid #ddd; }
        .input-group { display: flex; align-items: center; gap: 10px; font-size: 14px; color: var(--gray-chumbo); }
        .input-cobrador { padding: 8px; border: 1px solid #ddd; border-radius: 6px; width: 120px; outline: none; }
        
        .controls { display: flex; gap: 10px; margin-bottom: 25px; align-items: center; flex-wrap: wrap; }
        .search-box { flex-grow: 1; padding: 11px; border: 1px solid var(--gray-medium); border-radius: 8px; outline: none; }
        .btn-filter { background: white; border: 1px solid #dee2e6; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 500; color: #6c757d; }
        .btn-filter.active { background: var(--gray-chumbo); color: white; border-color: var(--gray-chumbo); }
        .btn-custom { background: white; color: var(--gray-chumbo); border: 1px solid #dee2e6; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500;}
        
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { padding: 12px; text-align: left; font-size: 11px; text-transform: uppercase; color: #adb5bd; border-bottom: 2px solid var(--gray-light); }
        td { padding: 14px 12px; border-bottom: 1px solid var(--gray-light); font-size: 13px; vertical-align: top; }
        
        .cliente-nome.cobrado { text-decoration: line-through; opacity: 0.5; color: #999; }
        .btn-wa { background: var(--wa-green); color: white; border: none; padding: 8px 14px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 12px; min-width: 90px; }
        .btn-wa.cobrado-status { background: var(--wa-cobrado); color: #555; }
        .btn-copy { background: var(--atraso-11); color: white; border: none; padding: 8px 14px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 12px; min-width: 90px; }
        .btn-copy:hover { background: #e8590c; }

        .titulos-list { font-size: 11px; margin-top: 4px; color: #666; font-family: monospace; white-space: nowrap; }
        .badge-dias { font-weight: bold; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
        .modal-content { background: white; padding: 30px; border-radius: 15px; max-width: 450px; width: 90%; text-align: center; }
        .btn-modal-close { background: var(--gray-chumbo); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .btn-limpeza { display: block; width: 100%; background: white; border: 1px solid #ddd; padding: 12px; border-radius: 6px; margin-bottom: 10px; cursor: pointer; font-weight: 500; color: var(--gray-chumbo); transition: 0.2s; }
        .btn-limpeza:hover { background: #f8f9fa; border-color: #ccc; }
        .btn-limpeza-tudo { border-color: var(--tamandare-red); color: var(--tamandare-red); }
        .btn-limpeza-tudo:hover { background: #fff5f5; }
    </style>
</head>
<body>

<div id="customAlert" class="modal-overlay">
    <div class="modal-content">
        <h3>⚠️ Aviso</h3>
        <p id="alertMsg" style="text-align: left; background: #fff5f5; padding: 15px; border-radius: 8px; border: 1px solid #fed7d7; font-size: 14px;"></p>
        <button class="btn-modal-close" onclick="fecharErro()">Entendi</button>
    </div>
</div>

<div id="limpezaAlert" class="modal-overlay">
    <div class="modal-content">
        <h3 style="margin-top: 0; color: var(--gray-chumbo);">🧹 Gerenciar Dados Salvos</h3>
        <p style="font-size: 14px; color: #666; text-align: left; margin-bottom: 20px;">O sistema salva automaticamente marcações e datas de cobrança para facilitar o uso. Escolha o que deseja apagar da memória:</p>
        
        <button class="btn-limpeza" onclick="executarLimpeza('historico')">Apagar Datas de "Última Cobrança"</button>
        <button class="btn-limpeza" onclick="executarLimpeza('sessao')">Desmarcar todos os Checkboxes</button>
        <button class="btn-limpeza" onclick="executarLimpeza('pref')">Apagar Preferência (App/Web)</button>
        <button class="btn-limpeza btn-limpeza-tudo" onclick="executarLimpeza('tudo')">⚠️ Apagar Tudo</button>
        
        <button class="btn-modal-close" style="margin-top: 15px;" onclick="fecharLimpeza()">Fechar</button>
    </div>
</div>

<div class="container">
    <div class="header">
        <h1>Cobrança Rápida</h1>
        <img src="logo.png" alt="Logo" class="logo">
    </div>

    <div class="input-row">
        <div class="btn-upload">
            <span>📁</span> <span id="fileNameLabel">Carregar CSV</span>
            <input type="file" id="csvFile" accept=".csv">
        </div>
        <div class="stats-container">
            <div class="stat-item">Clientes <span class="stat-value" id="statTotal">0</span></div>
            <div class="stat-item">CA <span class="stat-value" id="statCA">0</span></div>
            <div class="stat-item">FT e Afins <span class="stat-value" id="statFT">0</span></div>
            <div class="stat-item">Sem Whats <span class="stat-value" id="statSemFone" style="color: var(--tamandare-red);">0</span></div>
        </div>
        <div class="radio-group">
            <label><input type="radio" name="waPref" value="web" checked onchange="salvarPref(this.value)"> Web</label>
            <label><input type="radio" name="waPref" value="app" onchange="salvarPref(this.value)"> App</label>
        </div>
        <div class="input-group">
            <label><strong>Cobrador:</strong></label>
            <input type="text" id="cobradorNome" class="input-cobrador" placeholder="Nome">
        </div>
    </div>

    <div class="controls">
        <button class="btn-filter active" id="btnFT" onclick="setFilter('FT')">FT e Afins</button>
        <button class="btn-filter" id="btnCA" onclick="setFilter('CA')">Carteira (CA)</button>
        <input type="text" id="search" class="search-box" placeholder="Pesquisar por nome ou código...">
        <button class="btn-custom" onclick="exportarLog()">📄 Baixar Cobranças Realizadas</button>
        <button class="btn-custom" onclick="exportarSemFone()">⚠️ Sem Whats</button>
        <button class="btn-custom" onclick="abrirLimpeza()">🧹 Limpar Salvos</button>
    </div>

    <table id="tabelaCobranca">
        <thead>
            <tr>
                <th style="width:22%">Cliente</th>
                <th style="width:36%">Títulos / Valores / Atraso</th>
                <th style="width:14%">Total</th>
                <th style="width:12%;text-align:center">Últ. Cobr.</th>
                <th style="width:12%;text-align:right">Ação</th>
                <th style="width:4%;text-align:center">✔</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
    const MS_IN_DAY = 24 * 60 * 60 * 1000;
    let billingHistory = JSON.parse(localStorage.getItem('tt_billing_history') || '{}');
    let fileSessions = JSON.parse(localStorage.getItem('tt_file_sessions') || '{}');
    let rawData = [], currentMode = 'FT', cobradosIds = new Set(), currentFileKey = "", agrupadosGlobal = {};

    const mostrarErro = (t) => { document.getElementById('alertMsg').innerText = t; document.getElementById('customAlert').style.display = 'flex'; };
    const fecharErro = () => { document.getElementById('customAlert').style.display = 'none'; };
    
    // Funções do Modal de Limpeza
    function abrirLimpeza() { document.getElementById('limpezaAlert').style.display = 'flex'; }
    function fecharLimpeza() { document.getElementById('limpezaAlert').style.display = 'none'; }
    function executarLimpeza(tipo) {
        if (!confirm("Tem certeza que deseja apagar estes dados? Ação irreversível.")) return;
        
        if (tipo === 'historico' || tipo === 'tudo') {
            localStorage.removeItem('tt_billing_history');
            billingHistory = {};
        }
        if (tipo === 'sessao' || tipo === 'tudo') {
            localStorage.removeItem('tt_file_sessions');
            fileSessions = {};
            cobradosIds.clear();
        }
        if (tipo === 'pref' || tipo === 'tudo') {
            localStorage.removeItem('tt_wa_pref');
            document.querySelector(`input[name="waPref"][value="web"]`).checked = true;
        }
        
        fecharLimpeza();
        processAndRender();
    }

    const formatarMoeda = (v) => Number(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    const formatarDataHora = (ts) => { const d = new Date(ts); return d.toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit'}) + ' ' + d.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}); };
    const salvarPref = (v) => localStorage.setItem('tt_wa_pref', v);
    
    window.onload = () => { const p = localStorage.getItem('tt_wa_pref'); if (p) document.querySelector(`input[name="waPref"][value="${p}"]`).checked = true; };

    function converterValor(v) {
        if (!v) return 0;
        let s = v.toString().trim();
        if (s.includes(',') && s.includes('.')) s = s.replace(/\./g, '').replace(',', '.');
        else if (s.includes(',')) s = s.replace(',', '.');
        const n = parseFloat(s); return isNaN(n) ? 0 : n;
    }

    document.getElementById('csvFile').addEventListener('change', function(e) {
        if (e.target.files.length > 0) {
            const f = e.target.files[0]; document.getElementById('fileNameLabel').innerText = f.name; currentFileKey = f.name + "_" + f.size;
            Papa.parse(f, { header: true, delimiter: ";", encoding: "ISO-8859-1", skipEmptyLines: true, complete: (res) => {
                const cols = ["FONE", "DIAS EMATRASO", "CPF/CNPJ", "VALORATUALIZADO", "VALOR ARECEBER"];
                if (!cols.every(c => (res.meta.fields || []).includes(c))) { mostrarErro("Relatório incompatível. Gere em: CONTAS A RECEBER -> RELATÓRIOS -> CLIENTES -> TÍTULOS EM ABERTO ANALÍTICO."); rawData = []; e.target.value = ""; }
                else { cobradosIds = fileSessions[currentFileKey] ? new Set(fileSessions[currentFileKey].ids) : new Set(); rawData = res.data; processAndRender(); }
            }});
        }
    });

    const normalizarFP = (i) => ((i["DOCUMENTO"] || "").toUpperCase().includes("D") ? "FT" : i["FP"]);
    
    function setFilter(m) { 
        currentMode = m; 
        document.getElementById('btnFT').classList.toggle('active', m === 'FT'); 
        document.getElementById('btnCA').classList.toggle('active', m === 'CA'); 
        processAndRender(); 
    }

    function toggleCheck(id) {
        if (cobradosIds.has(id)) cobradosIds.delete(id); else cobradosIds.add(id);
        fileSessions[currentFileKey] = { ts: Date.now(), ids: Array.from(cobradosIds) };
        localStorage.setItem('tt_file_sessions', JSON.stringify(fileSessions));
        processAndRender();
    }

    function acionarWhatsApp(id, url, target) {
        window.open(url, target);
        const now = Date.now(), g = agrupadosGlobal[id];
        if (g) { g.titulos.forEach(t => { billingHistory[t.num] = now; }); localStorage.setItem('tt_billing_history', JSON.stringify(billingHistory)); }
        if (!cobradosIds.has(id)) toggleCheck(id); else processAndRender();
    }

    function copiarTexto(encodedMsg, btn) {
        const txt = decodeURIComponent(encodedMsg);
        navigator.clipboard.writeText(txt).then(() => {
            const oldTxt = btn.innerText;
            btn.innerText = "Copiado!";
            btn.style.opacity = "0.8";
            setTimeout(() => { btn.innerText = oldTxt; btn.style.opacity = "1"; }, 2000);
        });
    }

    function processAndRender() {
        const term = document.getElementById('search').value.toLowerCase(), cobr = document.getElementById('cobradorNome').value.trim();
        const todos = {};
        rawData.forEach(i => { 
            const id = i["CPF/CNPJ"]; if (!id) return;
            if (!todos[id]) todos[id] = { fone: i["FONE"], titulos: [] };
            todos[id].titulos.push({ num: i["DOCUMENTO"], fpO: i["FP"] });
        });
        
        let cCA = 0, cFT = 0, cSF = 0;
        Object.values(todos).forEach(g => {
            if (!processarTelefone(g.fone).valido) cSF++;
            if (g.titulos.some(t => t.num.toUpperCase().includes("D") || ['FT','DP','IX','CP','RN'].includes(t.fpO))) cFT++;
            if (g.titulos.some(t => t.fpO === 'CA' && !t.num.toUpperCase().includes("D"))) cCA++;
        });
        document.getElementById('statTotal').innerText = Object.keys(todos).length;
        document.getElementById('statCA').innerText = cCA; document.getElementById('statFT').innerText = cFT; document.getElementById('statSemFone').innerText = cSF;

        const fil = rawData.filter(i => {
            const d = parseInt(i["DIAS EMATRASO"]) || 0, fp = normalizarFP(i);
            const matchMode = currentMode === 'CA' ? fp === 'CA' : (['FT','DP','IX','CP','RN'].includes(fp) && d >= 4);
            const matchBusca = !term || i["NOME DO CLIENTE"]?.toLowerCase().includes(term) || i["CÓDIGO"]?.toString().includes(term);
            return matchMode && matchBusca;
        });

        const agT = {};
        fil.forEach(i => {
            const id = i["CPF/CNPJ"]; if (!id) return;
            if (!agT[id]) agT[id] = { codigo: i["CÓDIGO"], nome: (i["NOME DO CLIENTE"] || "").trim(), fone: i["FONE"], id: id, tO: 0, tA: 0, titulos: [] };
            const vO = converterValor(i["VALOR ARECEBER"]), vA = converterValor(i["VALORATUALIZADO"]);
            agT[id].tO += vO; agT[id].tA += vA;
            agT[id].titulos.push({ num: i["DOCUMENTO"], emissao: i["DATAEMISSÃO"], venc: i["DATAVENCIMENTO"], dias: parseInt(i["DIAS EMATRASO"])||0, vOrig: vO, vAtu: vA });
        });

        agrupadosGlobal = agT;
        let arr = Object.values(agT);
        arr.forEach(g => g.fd = processarTelefone(g.fone));
        arr.sort((a,b) => (a.fd.valido === b.fd.valido) ? a.nome.localeCompare(b.nome) : (a.fd.valido ? -1 : 1));

        const tbody = document.querySelector('#tabelaCobranca tbody'); tbody.innerHTML = '';
        arr.forEach(g => {
            const esta = cobradosIds.has(g.id), mAt = Math.max(...g.titulos.map(t => t.dias)), pref = document.querySelector('input[name="waPref"]:checked').value;
            let maisR = 0;
            let tHtml = g.titulos.map(t => {
                let cor = '#adb5bd'; if (currentMode !== 'CA') { if(t.dias>=30) cor='var(--atraso-30)'; else if(t.dias>=11) cor='var(--atraso-11)'; else if(t.dias>=4) cor='var(--atraso-4)'; }
                let ts = billingHistory[t.num]; if (ts && ts > maisR) maisR = ts;
                return `<div class="titulos-list">• ${t.num} | ${currentMode==='CA'?t.emissao:t.venc} | <span style="color:#333">${formatarMoeda(t.vOrig)}</span> | <span class="badge-dias" style="color:${cor}">${t.dias}d</span>${ts?`<span style="color:var(--gray-chumbo)"> [✓]</span>`:''}</div>`;
            }).join('');

            // Constroi Mensagens Revisadas
            const saud = `Olá, *${g.nome}*! Tudo bem? ${cobr ? 'Aqui é *' + cobr + '* da Tamandaré Tintas.' : 'Aqui é da Tamandaré Tintas.'}`;
            const ass = cobr ? `Atenciosamente,\n*${cobr}*\nTamandaré Tintas` : `Atenciosamente,\nEquipe Tamandaré Tintas`;
            let msg = "";

            if (currentMode === 'CA') {
                let mBody = g.titulos.map(t => `- Título: ${t.num} | Emissão: ${t.emissao} | Valor: ${formatarMoeda(t.vOrig)}`).join('\n');
                msg = `${saud}\n\nEstou entrando em contato para passar o fechamento e verificar a forma de pagamento.\n\nResumo dos títulos:\n${mBody}\n\n*Total: ${formatarMoeda(g.tO)}*\n\nPor favor, informe a forma de pagamento desejada:\n\n● PIX - Enviaremos a chave para pagamento.\n● BOLETO - Informe o vencimento desejado.\n● CARTÃO - Pagamento na loja.\n\nNo aguardo. Obrigado.`;
            } else {
                let mBody = g.titulos.map(t => `- Doc: ${t.num} | Venc.: ${t.venc} | Original: ${formatarMoeda(t.vOrig)} | Atualizado: ${formatarMoeda(t.vAtu)}`).join('\n');
                let fecho = `*Total Original: ${formatarMoeda(g.tO)}*\n*Total Atualizado: ${formatarMoeda(g.tA)}*`;
                
                if (mAt >= 30) {
                    msg = `*AVISO IMPORTANTE - RISCO DE PROTESTO*\n\n${saud}\n\nIdentificamos pendências com mais de 30 dias de atraso. Solicitamos a regularização imediata para evitar o envio automático ao protesto:\n\n${mBody}\n\n${fecho}\n\n${ass}`;
                } else if (mAt >= 11) {
                    msg = `${saud}\n\nNotamos títulos em aberto no sistema:\n\n${mBody}\n\n${fecho}\n\nTem alguma posição sobre esses pagamentos?\n\n${ass}`;
                } else {
                    msg = `${saud}\n\nEstou passando para lembrar que os títulos abaixo ainda constam em aberto em nosso sistema:\n\n${mBody}\n\n${fecho}\n\nCaso o pagamento já tenha sido realizado, por favor desconsiderar.\n\n${ass}`;
                }
            }

            const link = (pref === 'web' ? 'https://wa.me/' : 'whatsapp://send?phone=') + g.fd.numeroLimpo + '&text=' + encodeURIComponent(msg);
            
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><span class="cliente-nome ${esta?'cobrado':''}"><small style="color:#adb5bd">${g.codigo}</small><br><strong>${g.nome}</strong></span></td>
                <td>${tHtml}</td>
                <td style="vertical-align:middle">
                    ${currentMode==='CA' ? `<strong>${formatarMoeda(g.tO)}</strong>` : `<div style="font-size:11px">Orig: ${formatarMoeda(g.tO)}<br><strong style="font-size:13px">Atu: ${formatarMoeda(g.tA)}</strong></div>`}
                </td>
                <td style="vertical-align:middle;text-align:center;font-size:11px">${maisR?`<strong>${formatarDataHora(maisR)}</strong>`:`<span style="color:#ccc">Nunca</span>`}</td>
                <td style="text-align:right;vertical-align:middle">
                    ${g.fd.valido
                        ? `<div style="display:inline-flex;flex-direction:column;align-items:center"><button class="btn-wa ${esta?'cobrado-status':''}" onclick="acionarWhatsApp('${g.id}','${link}','${pref==='web'?'aba_wa':'_self'}')">${esta?'Cobrado':'WhatsApp'}</button><span style="font-size:9px;color:#999;margin-top:4px">${g.fd.original}</span></div>`
                        : `<div style="display:inline-flex;flex-direction:column;align-items:center"><button class="btn-copy" onclick="copiarTexto('${encodeURIComponent(msg)}', this)">Copiar</button><span style="font-size:9px;color:#999;margin-top:4px">${g.fd.original}</span></div>`
                    }
                </td>
                <td style="text-align:center;vertical-align:middle"><input type="checkbox" class="chk-cobrado" ${esta?'checked':''} onclick="toggleCheck('${g.id}')"></td>
            `;
            tbody.appendChild(tr);
        });
    }

    function processarTelefone(t) {
        if (!t) return { valido: false, numeroLimpo: "", original: "Sem fone" };
        let c = t.replace(/\D/g, ''); if (c.startsWith('0')) c = c.substring(1);
        return { valido: (c.length === 11 && c.charAt(2) === '9'), numeroLimpo: "55" + c, original: t.trim() };
    }

    function exportarLog() { 
        let l = []; const s = new Set(); rawData.forEach(i => { if (cobradosIds.has(i["CPF/CNPJ"]) && !s.has(i["CPF/CNPJ"])) { l.push(`Cliente: ${i["NOME DO CLIENTE"]} | Código: ${i["CÓDIGO"]} | CPF/CNPJ: ${i["CPF/CNPJ"]}`); s.add(i["CPF/CNPJ"]); } });
        if (!l.length) return mostrarErro("Nenhum cliente marcado.");
        const b = new Blob([l.join('\n')], { type: 'text/plain' }); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = `log-cobranca.txt`; a.click();
    }

    function exportarSemFone() {
        const t = document.getElementById('search').value.toLowerCase();
        let f = rawData.filter(i => {
            const fd = processarTelefone(i["FONE"]), b = !t || i["NOME DO CLIENTE"]?.toLowerCase().includes(t) || i["CÓDIGO"]?.toString().includes(t);
            if (currentMode==='CA') return normalizarFP(i)==='CA' && !fd.valido && b;
            return ['FT','DP','IX','CP','RN'].includes(normalizarFP(i)) && (parseInt(i["DIAS EMATRASO"])||0) >= 4 && !fd.valido && b;
        });
        const l = []; const s = new Set(); f.forEach(i => { if (!s.has(i["CPF/CNPJ"])) { l.push(`Código: ${i["CÓDIGO"]} | Cliente: ${i["NOME DO CLIENTE"].trim()} | Fone: ${i["FONE"]||"Vazio"}`); s.add(i["CPF/CNPJ"]); } });
        if (!l.length) return mostrarErro("Nenhum cliente sem Whats encontrado.");
        const b = new Blob([l.join('\n')], { type: 'text/plain' }); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = `sem_whatsapp.txt`; a.click();
    }
    document.getElementById('search').addEventListener('input', processAndRender);
    document.getElementById('cobradorNome').addEventListener('input', processAndRender);
</script>
