<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <title>Cobrança Rápida | Tamandaré Tintas</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --gray-light: #f8f9fa;
            --gray-medium: #e9ecef;
            --gray-chumbo: #495057;
            --text-dark: #343a40;
            --wa-green: #25d366;
            --wa-cobrado: #8eb19f;
            --primary-blue: #0d6efd;
            --tamandare-red: #fa5252;
            --atraso-4: #ffd43b;
            --atraso-11: #fd7e14;
            --atraso-30: #fa5252;
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: #f1f3f5; 
            color: var(--text-dark); 
            margin: 0; 
            padding: 20px; 
        }
        .container { 
            max-width: 1250px; 
            margin: auto; 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.05); 
        }
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 20px; 
        }
        .header h1 { 
            margin: 0; 
            font-weight: 300; 
            color: #495057; 
            font-size: 28px; 
        }
        .logo { height: 50px; }

        .input-row { 
            display: flex; 
            align-items: center; 
            gap: 20px; 
            margin-bottom: 15px; 
            padding: 15px; 
            background: var(--gray-light); 
            border-radius: 8px; 
            border-left: 5px solid var(--tamandare-red); 
        }
        .btn-upload-wrapper { 
            position: relative; 
            overflow: hidden; 
            display: inline-block; 
        }
        .btn-upload { 
            background: var(--tamandare-red); 
            color: white; 
            border: none; 
            padding: 12px 20px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 14px; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            transition: 0.2s; 
        }
        .btn-upload:hover { background: #e03131; }
        .btn-upload input[type=file] { 
            position: absolute; 
            left: 0; 
            top: 0; 
            opacity: 0; 
            cursor: pointer; 
            width: 100%; 
            height: 100%; 
        }

        .stats-container { 
            display: flex; 
            gap: 15px; 
            flex-grow: 1; 
            margin-left: 10px; 
        }
        .stat-item { 
            font-size: 10px; 
            text-transform: uppercase; 
            color: #adb5bd; 
            line-height: 1.2; 
            border-right: 1px solid #dee2e6; 
            padding-right: 15px; 
        }
        .stat-item:last-child { border-right: none; }
        .stat-value { 
            display: block; 
            color: var(--gray-chumbo); 
            font-weight: bold; 
            font-size: 14px; 
        }

        .input-group { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            font-size: 14px; 
            color: var(--gray-chumbo); 
        }
        .input-cobrador { 
            padding: 10px; 
            border: 1px solid #ddd; 
            border-radius: 6px; 
            width: 180px; 
            outline: none; 
        }

        .controls { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 25px; 
            align-items: center; 
            flex-wrap: wrap; 
        }
        .search-box { 
            flex-grow: 1; 
            padding: 11px; 
            border: 1px solid var(--gray-medium); 
            border-radius: 8px; 
            outline: none; 
        }
        .btn-filter { 
            background: white; 
            border: 1px solid #dee2e6; 
            padding: 10px 20px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 500; 
            color: #6c757d; 
        }
        .btn-filter.active { 
            background: var(--gray-chumbo); 
            color: white; 
            border-color: var(--gray-chumbo); 
        }
        .btn-custom { 
            background: white; 
            color: var(--gray-chumbo); 
            border: 1px solid #dee2e6; 
            padding: 8px 15px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 13px; 
            font-weight: 500; 
        }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            table-layout: fixed; 
        }
        th { 
            padding: 12px; 
            text-align: left; 
            font-size: 11px; 
            text-transform: uppercase; 
            color: #adb5bd; 
            border-bottom: 2px solid var(--gray-light); 
        }
        td { 
            padding: 16px 12px; 
            border-bottom: 1px solid var(--gray-light); 
            font-size: 14px; 
            vertical-align: top; 
        }
        .cliente-nome.cobrado { text-decoration: line-through; opacity: 0.5; color: #999; }
        .btn-wa { 
            background: var(--wa-green); 
            color: white; 
            border: none; 
            padding: 8px 14px; 
            border-radius: 6px; 
            cursor: pointer; 
            text-decoration: none; 
            font-weight: 600; 
            font-size: 12px; 
            display: inline-block; 
            min-width: 90px; 
            text-align: center; 
        }
        .btn-wa.cobrado-status { background: var(--wa-cobrado); color: #555; font-weight: 500; }
        .titulos-list { font-size: 11px; margin-top: 4px; color: #666; font-family: monospace; }
        .badge-dias { font-weight: bold; }
        .chk-cobrado { width: 20px; height: 20px; cursor: pointer; }

        .modal-overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.6); 
            display: none; 
            align-items: center; 
            justify-content: center; 
            z-index: 1000; 
            backdrop-filter: blur(4px); 
        }
        .modal-content { 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            max-width: 500px; 
            width: 90%; 
            text-align: center; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.2); 
        }
        .btn-modal-close { 
            background: var(--gray-chumbo); 
            color: white; 
            border: none; 
            padding: 12px 30px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 600; 
        }
    </style>
</head>
<body>

<div id="customAlert" class="modal-overlay">
    <div class="modal-content">
        <h3 style="color: var(--tamandare-red);">⚠️ Relatório Incompatível</h3>
        <p id="alertMsg" style="text-align: left; background: #fff5f5; padding: 15px; border-radius: 8px; border: 1px solid #fed7d7; font-size: 14px; line-height: 1.5;"></p>
        <button class="btn-modal-close" onclick="fecharErro()">Entendi</button>
    </div>
</div>

<div class="container">
    <div class="header">
        <h1>Cobrança Rápida</h1>
        <img src="logo.png" alt="Logo" class="logo">
    </div>

    <div class="input-row">
        <div class="btn-upload-wrapper">
            <button class="btn-upload">
                <span>📁</span> <span id="fileNameLabel">Carregar Arquivo CSV</span>
                <input type="file" id="csvFile" accept=".csv">
            </button>
        </div>
        <div class="stats-container">
            <div class="stat-item">Clientes Carregados <span class="stat-value" id="statTotal">0</span></div>
            <div class="stat-item">Carteira (CA) <span class="stat-value" id="statCA">0</span></div>
            <div class="stat-item">FT, DP e Etc.. <span class="stat-value" id="statFT">0</span></div>
            <div class="stat-item">Sem WhatsApp <span class="stat-value" id="statSemFone" style="color: var(--tamandare-red);">0</span></div>
        </div>
        <div class="input-group">
            <label for="cobradorNome"><strong>Cobrador:</strong></label>
            <input type="text" id="cobradorNome" class="input-cobrador" placeholder="(opcional) Nome">
        </div>
    </div>

    <div class="controls">
        <button class="btn-filter active" id="btnFT" onclick="setFilter('FT')">FT e Afins</button>
        <button class="btn-filter" id="btnCA" onclick="setFilter('CA')">Carteira (CA)</button>
        <input type="text" id="search" class="search-box" placeholder="Pesquisar por nome ou código do cliente...">
        <button class="btn-custom" onclick="exportarLog()">📄 Baixar Cobranças Realizadas</button>
        <button class="btn-custom" onclick="exportarSemFone()">⚠️ Clientes sem WhatsApp</button>
    </div>
    
    <table id="tabelaCobranca">
        <thead>
            <tr>
                <th style="width: 28%;">Código | Cliente</th>
                <th id="colDataRef" style="width: 38%;">Títulos / Vencimento / Atraso</th>
                <th style="width: 12%;">Total</th>
                <th style="width: 16%; text-align: right;">Ação</th>
                <th style="width: 6%; text-align: center;">✔</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
    let rawData = [];
    let currentMode = 'FT';
    let cobradosIds = new Set();

    function mostrarErro(texto) {
        document.getElementById('alertMsg').innerText = texto;
        document.getElementById('customAlert').style.display = 'flex';
    }

    function fecharErro() { 
        document.getElementById('customAlert').style.display = 'none'; 
    }

    function converterValor(valor) {
        if (!valor) return 0;
        let str = valor.toString().trim();
        str = str.replace(/\./g, '').replace(',', '.');
        const num = parseFloat(str);
        return isNaN(num) ? 0 : num;
    }

    function formatarMoeda(valor) {
        return Number(valor).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    document.getElementById('csvFile').addEventListener('change', function(e) {
        if (e.target.files.length > 0) {
            const file = e.target.files[0];
            document.getElementById('fileNameLabel').innerText = file.name;
            Papa.parse(file, {
                header: true, 
                delimiter: ";", 
                encoding: "ISO-8859-1", 
                skipEmptyLines: true,
                complete: (results) => {
                    const colunasObrigatorias = ["FONE", "DIAS EMATRASO", "CPF/CNPJ", "VALORATUALIZADO", "VALOR ARECEBER"];
                    const colunasArquivo = results.meta.fields || [];
                    const ehIncompativel = !colunasObrigatorias.every(col => colunasArquivo.includes(col));
                    
                    if (ehIncompativel) {
                        mostrarErro("Relatório incompatível, certifique-se de que gerou o relatório usando o caminho correto:\n\nCONTAS A RECEBER - RELATÓRIOS - CLIENTES - TÍTULOS EM ABERTO ANALÍTICO POR DOCUMENTO, salvar em CSV.");
                        rawData = []; 
                        document.getElementById('fileNameLabel').innerText = "Carregar Arquivo CSV"; 
                        e.target.value = ""; 
                        atualizarContadores({});
                    } else {
                        cobradosIds.clear(); 
                        rawData = results.data; 
                        processAndRender();
                    }
                }
            });
        }
    });

    function normalizarFP(item) {
        const doc = (item["DOCUMENTO"] || "").toUpperCase();
        let fp = item["FP"];
        if (doc.includes("D")) fp = "FT";
        return fp;
    }

    function setFilter(mode) {
        currentMode = mode;
        document.getElementById('btnFT').classList.toggle('active', mode === 'FT');
        document.getElementById('btnCA').classList.toggle('active', mode === 'CA');
        document.getElementById('colDataRef').innerText = mode === 'CA' ? 'Títulos / Emissão' : 'Títulos / Vencimento / Atraso';
        processAndRender();
    }

    function toggleCheck(id) {
        if (cobradosIds.has(id)) {
            cobradosIds.delete(id);
        } else {
            cobradosIds.add(id);
        }
        processAndRender();
    }

    function atualizarContadores(agrupadosGeral) {
        let total = Object.keys(agrupadosGeral).length;
        let ca = 0; 
        let ft = 0; 
        let semFone = 0;
        
        Object.values(agrupadosGeral).forEach(g => {
            const foneData = processarTelefone(g.fone);
            if (!foneData.valido) semFone++;
            
            const temFT = g.titulos.some(t => t.num.toUpperCase().includes("D") || ['FT', 'DP', 'IX', 'CP', 'RN'].includes(t.fpOriginal));
            const temCA = g.titulos.some(t => t.fpOriginal === 'CA' && !t.num.toUpperCase().includes("D"));
            
            if (temFT) ft++; 
            if (temCA) ca++;
        });
        
        document.getElementById('statTotal').innerText = total;
        document.getElementById('statCA').innerText = ca;
        document.getElementById('statFT').innerText = ft;
        document.getElementById('statSemFone').innerText = semFone;
    }

    function processarTelefone(tel) {
        if (!tel) return { valido: false, numeroLimpo: "", original: "Sem fone" };
        let clean = tel.replace(/\D/g, '');
        if (clean.startsWith('0')) clean = clean.substring(1);
        const ehCelular = clean.length === 11 && clean.charAt(2) === '9';
        return { valido: ehCelular, numeroLimpo: "55" + clean, original: tel.trim() };
    }

    function processAndRender() {
        const term = document.getElementById('search').value.toLowerCase();
        const cobrador = document.getElementById('cobradorNome').value.trim();
        
        // Agrupamento Geral para Contadores
        const todosAgrupados = {};
        rawData.forEach(item => {
            const id = item["CPF/CNPJ"]; 
            if (!id) return;
            if (!todosAgrupados[id]) todosAgrupados[id] = { fone: item["FONE"], titulos: [] };
            todosAgrupados[id].titulos.push({ num: item["DOCUMENTO"], fpOriginal: item["FP"] });
        });
        atualizarContadores(todosAgrupados);

        // Filtro da Tela (Modo e Busca)
        let filtrados = rawData.filter(item => {
            const dias = parseInt(item["DIAS EMATRASO"]) || 0;
            const fp = normalizarFP(item);
            if (currentMode === 'CA') return fp === 'CA';
            return ['FT', 'DP', 'IX', 'CP', 'RN'].includes(fp) && dias >= 4;
        });

        if (term) {
            filtrados = filtrados.filter(i => 
                i["NOME DO CLIENTE"]?.toLowerCase().includes(term) || 
                i["CÓDIGO"]?.toString().includes(term)
            );
        }

        const agrupadosTela = {};
        filtrados.forEach(item => {
            const id = item["CPF/CNPJ"]; 
            if (!id) return;
            if (!agrupadosTela[id]) {
                agrupadosTela[id] = { 
                    codigo: item["CÓDIGO"], 
                    nome: (item["NOME DO CLIENTE"] || "").trim(), 
                    fone: item["FONE"], 
                    id: id, 
                    totalOriginal: 0, 
                    totalAtualizado: 0, 
                    titulos: [] 
                };
            }
            
            const vOrig = converterValor(item["VALOR ARECEBER"]);
            const vAtu = converterValor(item["VALORATUALIZADO"]);
            
            agrupadosTela[id].totalOriginal += vOrig;
            agrupadosTela[id].totalAtualizado += vAtu;
            agrupadosTela[id].titulos.push({ 
                num: item["DOCUMENTO"], 
                emissao: item["DATAEMISSÃO"], 
                venc: item["DATAVENCIMENTO"], 
                dias: parseInt(item["DIAS EMATRASO"]) || 0, 
                vOrig: vOrig, 
                vAtu: vAtu 
            });
        });

        // Ordenação: WhatsApp primeiro, depois ordem alfabética
        let gruposArray = Object.values(agrupadosTela);
        gruposArray.forEach(g => g.foneData = processarTelefone(g.fone));
        gruposArray.sort((a, b) => {
            if (a.foneData.valido && !b.foneData.valido) return -1;
            if (!a.foneData.valido && b.foneData.valido) return 1;
            return a.nome.localeCompare(b.nome);
        });

        const tbody = document.querySelector('#tabelaCobranca tbody');
        tbody.innerHTML = '';
        
        gruposArray.forEach(g => {
            const foneData = g.foneData;
            const estaCobrado = cobradosIds.has(g.id);
            const totalFmt = currentMode === 'CA' ? formatarMoeda(g.totalOriginal) : formatarMoeda(g.totalAtualizado);
            const maiorAtraso = Math.max(...g.titulos.map(t => t.dias));
            
            const saudacao = `Olá, *${g.nome || 'Cliente'}*! Tudo bem? ${cobrador ? 'Aqui é *' + cobrador + '* da Tamandaré Tintas.' : 'Aqui é da Tamandaré Tintas.'}`;
            const assina = cobrador ? `Atenciosamente,\n*${cobrador}*\nTamandaré Tintas` : `Atenciosamente,\nEquipe Tamandaré Tintas`;

            let titulosHtml = g.titulos.map(t => {
                let cor = '#adb5bd';
                if (currentMode !== 'CA') {
                    if (t.dias >= 30) cor = 'var(--atraso-30)';
                    else if (t.dias >= 11) cor = 'var(--atraso-11)';
                    else if (t.dias >= 4) cor = 'var(--atraso-4)';
                }
                return `<div class="titulos-list">• Doc: ${t.num} | ${currentMode === 'CA' ? t.emissao : t.venc} | <span class="badge-dias" style="color:${cor}">${t.dias} Dias</span></div>`;
            }).join('');

            let msg = "";
            if (currentMode === 'CA') {
                let listaMsg = g.titulos.map(t => `- Título: ${t.num} | Emissão: ${t.emissao} | Valor: ${formatarMoeda(t.vOrig)}`).join('\n');
                msg = `${saudacao}\n\nEstou entrando em contato para passar o fechamento e verificar a forma de pagamento.\n\nResumo dos títulos:\n${listaMsg}\n\n*Total: ${formatarMoeda(g.totalOriginal)}*\n\nPor favor, informe a forma de pagamento desejada:\n\n● PIX - Enviaremos a chave para pagamento.\n● BOLETO - Informe o vencimento desejado.\n● CARTÃO - Pagamento na loja.\n\nNo aguardo. Obrigado.`;
            } else {
                let listaMsg = g.titulos.map(t => `- Doc: ${t.num} | Venc.: ${t.venc} | Original: ${formatarMoeda(t.vOrig)} | Atualizado: ${formatarMoeda(t.vAtu)}`).join('\n');
                let fechamentoValores = `*Total Original: ${formatarMoeda(g.totalOriginal)}*\n*Total Atualizado: ${formatarMoeda(g.totalAtualizado)}*`;
                
                if (maiorAtraso >= 30) {
                    msg = `*AVISO IMPORTANTE - RISCO DE PROTESTO*\n\n${saudacao}\n\nIdentificamos pendências com mais de 30 dias de atraso. Solicitamos a regularização para evitar envio automático ao protesto.\n\n${listaMsg}\n\n${fechamentoValores}\n\n${assina}`;
                } else if (maiorAtraso >= 11) {
                    msg = `${saudacao}\n\nNotamos títulos em aberto no sistema:\n\n${listaMsg}\n\n${fechamentoValores}\n\nTem alguma posição sobre esses pagamentos?\n\n${assina}`;
                } else {
                    msg = `${saudacao}\n\nEstou passando para lembrar que os títulos abaixo ainda constam em aberto em nosso sistema:\n\n${listaMsg}\n\n${fechamentoValores}\n\nCaso o pagamento já tenha sido realizado, por favor desconsiderar.\n\n${assina}`;
                }
            }

            const waLink = `https://wa.me/${foneData.numeroLimpo}?text=${encodeURIComponent(msg)}`;
            const tr = document.createElement('tr');
            
            tr.innerHTML = `
                <td>
                    <span class="cliente-nome ${estaCobrado ? 'cobrado' : ''}">
                        <small style="color:#adb5bd">${g.codigo}</small><br>
                        <strong>${g.nome}</strong>
                    </span>
                </td>
                <td>${titulosHtml}</td>
                <td style="vertical-align: middle;"><strong>${totalFmt}</strong></td>
                <td style="text-align: right; vertical-align: middle;">
                    ${foneData.valido 
                        ? `<a href="${waLink}" target="_blank" class="btn-wa ${estaCobrado ? 'cobrado-status' : ''}" onclick="if(!cobradosIds.has('${g.id}')) toggleCheck('${g.id}')">${estaCobrado ? 'Cobrado' : 'WhatsApp'}</a>
                           <div style="font-size:10px; color:#666; font-family:monospace; margin-top:5px; text-align:center;">${foneData.original}</div>` 
                        : `<span style="font-size:12px; color:#999">${foneData.original}</span>`
                    }
                </td>
                <td style="text-align: center; vertical-align: middle;">
                    <input type="checkbox" class="chk-cobrado" ${estaCobrado ? 'checked' : ''} onclick="toggleCheck('${g.id}')">
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    function exportarLog() {
        let log = []; 
        const seen = new Set();
        
        rawData.forEach(item => {
            if (cobradosIds.has(item["CPF/CNPJ"]) && !seen.has(item["CPF/CNPJ"])) {
                log.push(`Cliente: ${item["NOME DO CLIENTE"]} | Código: ${item["CÓDIGO"]} | CPF/CNPJ: ${item["CPF/CNPJ"]}`);
                seen.add(item["CPF/CNPJ"]);
            }
        });
        
        if (log.length === 0) return mostrarErro("Nenhum cliente marcado no checklist.");
        
        const blob = new Blob([log.join('\n')], { type: 'text/plain' });
        const a = document.createElement('a'); 
        a.href = URL.createObjectURL(blob);
        a.download = `log-cobranca.txt`; 
        a.click();
    }

    function exportarSemFone() {
        const term = document.getElementById('search').value.toLowerCase();
        
        let filtrados = rawData.filter(item => {
            const dias = parseInt(item["DIAS EMATRASO"]) || 0;
            const fp = normalizarFP(item);
            const foneData = processarTelefone(item["FONE"]);
            const busca = !term || item["NOME DO CLIENTE"]?.toLowerCase().includes(term) || item["CÓDIGO"]?.toString().includes(term);
            
            if (currentMode === 'CA') return fp === 'CA' && !foneData.valido && busca;
            return ['FT', 'DP', 'IX', 'CP', 'RN'].includes(fp) && dias >= 4 && !foneData.valido && busca;
        });
        
        const semFoneList = []; 
        const seen = new Set();
        
        filtrados.forEach(item => {
            if (!seen.has(item["CPF/CNPJ"])) {
                semFoneList.push(`Código: ${item["CÓDIGO"]} | Cliente: ${item["NOME DO CLIENTE"].trim()} | Fone: ${item["FONE"] || "Vazio"}`);
                seen.add(item["CPF/CNPJ"]);
            }
        });
        
        if (semFoneList.length === 0) return mostrarErro("Nenhum cliente sem WhatsApp encontrado nos filtros/busca atuais.");
        
        const blob = new Blob([semFoneList.join('\n')], { type: 'text/plain' });
        const a = document.createElement('a'); 
        a.href = URL.createObjectURL(blob);
        a.download = `clientes_sem_whatsapp.txt`; 
        a.click();
    }

    document.getElementById('search').addEventListener('input', processAndRender);
    document.getElementById('cobradorNome').addEventListener('input', processAndRender);
</script>
</body>
</html>
